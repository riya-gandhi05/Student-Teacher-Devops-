services:
  app:
    build: .
    ports:
      - "9001:4000"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    user: root
    privileged: true
    ports:
      - "5002:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fsdb
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus

  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  jenkins_home: